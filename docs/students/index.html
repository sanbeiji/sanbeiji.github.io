    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>𝄢 Student Practice</title>
    <link rel="apple-touch-icon" sizes="180x180" href="../assets/img/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../assets/img/favicon-32x32.png">

    <link rel="stylesheet" type="text/css" href="../assets/css/main.css">
    
    <style>
      .practice-checkbox {
        width: 28px !important;
        height: 28px !important;
        -webkit-transform: none !important;
        -moz-transform: none !important;
        -ms-transform: none !important;
        -o-transform: none !important;
        transform: none !important;
        margin-right: 15px !important;
        margin-left: 5px !important;
        margin-top: 0 !important;
        float: none !important;
        display: inline-block !important;
        flex-shrink: 0;
        cursor: pointer;
      }
      .practice-item {
        display: flex;
        align-items: flex-start;
        margin-bottom: 20px;
        font-size: 1.1em;
        text-align: left;
        position: relative;
      }
      .drag-handle {
        cursor: grab;
        margin-right: 10px;
        padding: 0 5px;
        color: #aaa;
        font-size: 1.2em;
        user-select: none;
        display: flex;
        align-items: center;
        height: 28px;
        align-self: flex-start;
        flex-shrink: 0;
      }
      .drag-handle:active {
        cursor: grabbing;
        color: #555;
      }
      .practice-item.dragging {
        opacity: 0.4;
        background-color: rgba(0, 0, 0, 0.02);
      }
      .practice-item-content {
        flex-grow: 1;
        display: flex;
        align-items: center;
      }
      .practice-item label {
        flex-grow: 1;
        cursor: pointer;
        display: block;
        line-height: 1.3;
      }
      .practice-input {
        flex-grow: 1;
        padding: 10px;
        font-size: 1em;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box;
      }
      .btn {
        padding: 10px 15px;
        font-size: 1em;
        cursor: pointer;
        border: 1px solid #ccc;
        border-radius: 5px;
        background-color: #eee;
        color: #333;
        margin-bottom: 10px;
        transition: all 0.2s ease;
      }
      /* Material 3 Action Bar & Stopwatch styles */
      .action-bar-container {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 20px;
        margin-bottom: 25px;
        flex-wrap: wrap;
      }
      .session-actions-group {
        display: flex;
        align-items: center;
        gap: 20px;
      }
      .m3-button-group {
        display: flex;
        align-items: center;
      }
      .m3-button {
        height: 40px;
        padding: 0 24px;
        font-size: 0.875rem;
        font-weight: 500;
        letter-spacing: 0.1px;
        cursor: pointer;
        border: 1px solid #ccc;
        transition: all 0.2s ease;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        box-sizing: border-box;
      }
      .m3-button.left-btn {
        border-top-left-radius: 100px;
        border-bottom-left-radius: 100px;
        border-top-right-radius: 0;
        border-bottom-right-radius: 0;
      }
      .m3-button.right-btn {
        border-top-right-radius: 100px;
        border-bottom-right-radius: 100px;
        border-top-left-radius: 0;
        border-bottom-left-radius: 0;
        margin-left: -1px;
      }
      .m3-button.middle-btn {
        border-radius: 0;
        margin-left: -1px;
      }
      .m3-button-filled {
        background-color: #0066cc;
        color: white;
        border-color: #0066cc;
      }
      .m3-button-filled:hover {
        background-color: #0052a3;
        border-color: #0052a3;
      }
      .m3-button-filled:active {
        background-color: #003d7a;
        border-color: #003d7a;
      }
      .m3-button-outlined {
        background-color: transparent;
        color: #0066cc;
        border-color: #79747e;
      }
      .m3-button-outlined:hover {
        background-color: rgba(0, 102, 204, 0.08);
      }
      .m3-button-outlined:active {
        background-color: rgba(0, 102, 204, 0.16);
      }
      .stopwatch {
        font-family: monospace;
        font-size: 1.3rem;
        font-weight: bold;
        color: #ff3333;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        height: 40px;
        padding: 0 12px;
        background-color: #000;
        border-radius: 8px;
        border: 1px solid #111;
        min-width: 80px;
        text-shadow: 0 0 6px rgba(255, 51, 51, 0.6);
        box-shadow: inset 0 2px 4px rgba(0,0,0,0.9);
        box-sizing: border-box;
      }
      /* Material 3 Color Tones and Animations */
      .m3-button-green {
        background-color: #388e3c !important;
        color: white !important;
        border-color: #388e3c !important;
      }
      .m3-button-green:hover {
        background-color: #2e7d32 !important;
        border-color: #2e7d32 !important;
      }
      .m3-button-yellow {
        background-color: #fbc02d !important;
        color: #222 !important;
        border-color: #fbc02d !important;
      }
      .m3-button-yellow:hover {
        background-color: #f9a825 !important;
        border-color: #f9a825 !important;
      }
      .m3-button-red {
        background-color: #d32f2f !important;
        color: white !important;
        border-color: #d32f2f !important;
      }
      .m3-button-red:hover {
        background-color: #c62828 !important;
        border-color: #c62828 !important;
      }
      .m3-button-red:active {
        background-color: #b71c1c !important;
        border-color: #b71c1c !important;
      }
      .m3-button-purple {
        background-color: #673ab7 !important;
        color: white !important;
        border-color: #673ab7 !important;
      }
      .m3-button-purple:hover {
        background-color: #5e35b1 !important;
        border-color: #5e35b1 !important;
      }
      .m3-button-purple:active {
        background-color: #512da8 !important;
        border-color: #512da8 !important;
      }
      .m3-button-blue {
        background-color: #4f8dd6 !important;
        color: white !important;
        border-color: #4f8dd6 !important;
      }
      .m3-button-blue:hover {
        background-color: #3a7bc8 !important;
        border-color: #3a7bc8 !important;
      }
      .m3-button-blue:active {
        background-color: #2b63a7 !important;
        border-color: #2b63a7 !important;
      }
      .m3-button-blue-pulsate {
        background-color: #4f8dd6 !important;
        color: white !important;
        border-color: #4f8dd6 !important;
        animation: m3Pulsate 1.8s infinite ease-in-out !important;
      }
      @keyframes m3Pulsate {
        0%, 100% {
          box-shadow: 0 0 0 0 rgba(79, 141, 214, 0.6);
          transform: scale(1);
        }
        50% {
          box-shadow: 0 0 0 8px rgba(79, 141, 214, 0);
          transform: scale(1.02);
        }
      }
      /* Material 3 Dialog Modal */
      .m3-dialog-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: rgba(0, 0, 0, 0.32);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 2000;
        animation: m3FadeIn 0.2s cubic-bezier(0.2, 0, 0, 1);
      }
      .m3-dialog {
        background-color: #fff;
        border-radius: 28px;
        padding: 24px;
        width: 100%;
        max-width: 360px;
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.12);
        display: flex;
        flex-direction: column;
        box-sizing: border-box;
        animation: m3ZoomIn 0.25s cubic-bezier(0.2, 0, 0, 1);
      }
      .m3-dialog-title {
        font-size: 1.5rem;
        font-weight: 500;
        color: #1c1b1f;
        margin-bottom: 12px;
        margin-top: 0;
      }
      .m3-dialog-actions {
        display: flex;
        justify-content: flex-end;
        align-items: center;
        margin-top: 16px;
      }
      @keyframes m3FadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes m3ZoomIn {
        from { transform: scale(0.95); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
      }
      /* Font Synchronization & Responsive Mobile Adaptations */
      .m3-button, .m3-button *, .stopwatch, .m3-dialog, .m3-dialog-title, .practice-input {
        font-family: 'Special Elite', 'Noto Serif SC', 'Kaiti TC', monospace !important;
      }
      .m3-button .button-icon {
        margin-right: 6px;
        display: inline-block;
      }
      @media screen and (max-width: 480px) {
        #layout {
          width: 94% !important;
          margin: 1em auto !important;
          padding: 1.2em 0.6em !important;
        }
        #tools {
          width: 100% !important;
          max-width: 100% !important;
        }
        .practice-item {
          margin-bottom: 15px !important;
        }
        .practice-checkbox {
          margin-right: 10px !important;
        }
        .m3-button-group .button-text {
          display: none !important;
        }
        .m3-button .button-icon {
          margin-right: 0 !important;
        }
        .m3-button {
          padding: 0 16px !important;
        }
        .action-bar-container {
          gap: 10px !important;
        }
        .session-actions-group {
          gap: 10px !important;
        }
      }
      .btn-primary {
        background-color: #0066cc;
        color: white;
      }
      .del-btn {
        margin-left: 10px;
        background: #ff4444;
        color: white;
        border: none;
        border-radius: 3px;
        padding: 8px 12px;
        cursor: pointer;
        font-weight: bold;
      }
      #student-name-container {
        margin-bottom: 30px;
        text-align: center;
      }
      #student-name {
        font-size: 1.5em;
        padding: 10px;
        text-align: center;
        width: 100%;
        max-width: 400px;
        border: 2px solid #ccc;
        border-radius: 8px;
      }
    </style>

  </head>
  <body id="top" class="practice">
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-K7PGFL7" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

    <div id="layout">
      <div id="bc">
        <a href="" title="Why aren't you practicing?" class="logo refresh-button" onclick="location.reload()">
          <img src="../assets/img/bassclef.gif" class="anim" alt="bass clef logo"></a>
      </div>
      <div id="info" style="margin-bottom: 20px;">
        <span id="twitter"><a href="https://sanbeiji.com" title="Seriously. Go practice." class="twitter" target="_blank">@sanbeiji</a> student app</span>
      </div>
      <div id="date"></div>
      
      <!-- TOOLS WRAPPER -->
      <div id="tools">
        
        <!-- STUDENT NAME -->
        <div id="student-name-container" style="margin-bottom: 30px;">
          <div id="student-name-view" style="display:flex; justify-content:center; align-items:center; font-size:1.5em; font-weight:bold; min-height: 40px;">
            <span id="student-name-text"></span>
            <span id="student-name-edit-icon" style="cursor:pointer; margin-left:10px; font-size:0.7em;" title="Edit Name">✏️</span>
          </div>
          <div id="student-name-edit" style="display:none; justify-content:center; align-items:center;">
            <input type="text" id="student-name-input" placeholder="Student Name" style="font-size:1.5em; padding:10px; text-align:center; width:100%; max-width:400px; border:2px solid #ccc; border-radius:8px;">
          </div>
        </div>

        <!-- ACTION BAR CONTAINER -->
        <div class="action-bar-container">
          <!-- Default Mode: Start / Edit List / Share -->
          <div id="default-actions" class="m3-button-group">
            <button id="btn-start-session" class="m3-button m3-button-filled m3-button-green left-btn" title="Click to begin practice session timer"><span class="button-icon">▶️</span><span class="button-text"> Start</span></button>
            <button id="btn-toggle-edit" class="m3-button m3-button-filled m3-button-blue middle-btn"><span class="button-icon">✏️</span><span class="button-text"> Edit List</span></button>
            <button id="btn-get-link" class="m3-button m3-button-filled m3-button-purple right-btn"><span class="button-icon">🔗</span><span class="button-text"> Share</span></button>
          </div>

          <!-- Active Practice Session Mode: Pause/Resume / End Buttons + Stopwatch -->
          <div id="session-actions" class="session-actions-group" style="display: none;">
            <div class="m3-button-group">
              <button id="btn-pause-resume" class="m3-button m3-button-filled m3-button-yellow left-btn"><span class="button-icon">⏸️</span><span class="button-text"> Pause</span></button>
              <button id="btn-end-session" class="m3-button m3-button-filled m3-button-red right-btn"><span class="button-icon">⏹️</span><span class="button-text"> End</span></button>
            </div>
            <div id="stopwatch-display" class="stopwatch">00:00</div>
          </div>
        </div>
        <div style="text-align: center; margin-top: -10px; margin-bottom: 20px;">
          <div id="start-time-display" style="font-style: italic; color: #555;"></div>
        </div>

        <!-- CHECKLIST -->
        <div id="checklist-container"></div>
        
        <div style="text-align: center; margin-top: 20px;">
          <button id="btn-add-item" class="m3-button m3-button-filled" style="border-radius: 100px;">+ Add Practice Item</button>
          <div id="complete-time-display" style="margin-top: 10px; font-style: italic; color: #555;"></div>
        </div>

       <!-- MATERIAL 3 SHARE DIALOG -->
       <div id="share-dialog-overlay" class="m3-dialog-overlay" style="display: none;">
         <div class="m3-dialog">
           <h3 class="m3-dialog-title">Share Checklist</h3>
           <p style="margin-bottom: 16px; color: #555; font-size: 0.95em;">Copy the link below to share this practice checklist with others:</p>
           <input type="text" id="share-link-m3" readonly class="practice-input" style="text-align: center; margin-bottom: 20px; font-family: monospace;">
           <div class="m3-dialog-actions">
             <button id="btn-dialog-close" class="m3-button m3-button-outlined" style="border: none; border-radius: 100px; height: 36px;">Close</button>
             <button id="btn-copy-link-m3" class="m3-button m3-button-filled" style="border-radius: 100px; height: 36px; margin-left: 8px;">Copy Link</button>
           </div>
         </div>
       </div>

      </div>
    </div>
    
    <script src="../assets/js/student-app.js"></script>
  </body> 
</html>
