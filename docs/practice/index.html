    <meta charset="utf-8">

    <title>𝄢 Practice</title>
    <link rel="apple-touch-icon" sizes="180x180" href="../assets/img/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../assets/img/favicon-32x32.png">

    <style>
      /* Additional styles for the new dynamic app */
      .practice-checkbox {
        margin-right: 20px !important;
        margin-left: 10px !important;
        margin-top: 2px !important;
        float: none !important;
        display: inline-block !important;
        flex-shrink: 0;
      }
      .practice-item {
        display: flex;
        align-items: flex-start;
        margin-bottom: 20px;
        font-size: 1.1em;
        text-align: left;
      }
      .practice-item label {
        flex-grow: 1;
        cursor: pointer;
        display: block;
        line-height: 1.3;
      }
      .practice-input {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
        font-size: 1em;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box;
      }
      .practice-item-content {
        flex-grow: 1;
      }
      
      .btn {
        padding: 10px 15px;
        font-size: 1em;
        cursor: pointer;
        border: none;
        border-radius: 5px;
        background-color: #eee;
        color: #333;
        margin-bottom: 10px;
        margin-right: 10px;
      }
      .btn-primary {
        background-color: #0066cc;
        color: white;
      }
      
      #edit-pool-container {
        margin-top: 30px;
        padding-top: 20px;
        border-top: 2px solid #eee;
      }
      
      .pool-section {
        margin-bottom: 20px;
      }
      
      .pool-item {
        display: flex;
        align-items: center;
        margin-bottom: 5px;
      }
      .pool-item select {
        width: 60px;
        margin-right: 10px;
        padding: 5px;
      }
      .pool-item span {
        flex-grow: 1;
      }
      .pool-item button {
        padding: 5px 10px;
        background: #ff4444;
        color: white;
        border: none;
        border-radius: 3px;
        cursor: pointer;
      }
      
      .add-item-form {
        display: flex;
        margin-top: 10px;
      }
      .add-item-form input[type="text"] {
        flex-grow: 1;
        padding: 8px;
        margin-right: 10px;
      }
    </style>

    <script src="../assets/js/practice.js"></script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-VBHK3HM26V"></script>

  <body id="top" class="practice">
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-K7PGFL7" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

    <div id="layout">
      <div id="bc">
        <a href="" title="Why aren't you practicing?" class="logo refresh-button" onclick="location.reload()">
          <img src="../assets/img/bassclef.gif" class="anim" alt="bass clef logo"></a>
      </div>
      <div id="info" style="margin-bottom: 20px;">
        <span id="twitter"><a href="https://sanbeiji.com" title="Seriously. Go practice." class="twitter" target="_blank">@sanbeiji</a> practice app</span>
      </div>
      <div id="date"></div>
      
      <!-- TOOLS WRAPPER -->
      <div id="tools">
        <!-- MAIN CONTROLS -->
        <div style="margin-bottom: 20px; text-align: center;">
          <button id="btn-regenerate" class="btn btn-primary">Regenerate List</button>
          <div style="margin-top: 10px;">
            <label for="excerpt-count">Number of excerpts:</label>
            <select id="excerpt-count" style="padding: 5px;">
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="4">4</option>
              <option value="5">5</option>
              <option value="6">6</option>
              <option value="7">7</option>
              <option value="8">8</option>
              <option value="9">9</option>
              <option value="10">10</option>
            </select>          </div>
        </div>

        <!-- CHECKLIST -->
        <div id="checklist-container"></div>
        
        <div style="text-align: center; margin-top: 20px;">
          <button id="btn-toggle-pool" class="btn" style="background-color: #ddd;">Edit pools</button>
        </div>
        
        <!-- EDIT POOL VIEW -->
        <div id="edit-pool-container" style="display: none;">
          <h2>Edit Pools (Weights 1-10)</h2>
          
          <div class="pool-section">
            <h3>Strauss Pool</h3>
            <div id="strauss-pool-list"></div>
            <form id="form-add-strauss" class="add-item-form">
              <input type="text" placeholder="New Strauss excerpt..." required>
              <select style="width:60px; margin-right:10px;">
                <option value="1" selected>1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option><option value="10">10</option>
              </select>
              <button type="submit" class="btn">Add</button>
            </form>
          </div>

          <div class="pool-section">
            <h3>General Excerpts Pool</h3>
            <div id="excerpts-pool-list"></div>
            <form id="form-add-excerpt" class="add-item-form">
              <input type="text" placeholder="New general excerpt..." required>
              <select style="width:60px; margin-right:10px;">
                <option value="1" selected>1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option><option value="10">10</option>
              </select>
              <button type="submit" class="btn">Add</button>
            </form>
          </div>
        </div>
      </div>
    </div>
    
    <script src="../assets/js/practice-app.js"></script>
  </body> 
</html>
